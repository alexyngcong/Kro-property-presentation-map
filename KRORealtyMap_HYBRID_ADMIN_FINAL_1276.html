async function searchNominatimDirect(q) {
  const query = (q || '').trim();
  if (!query) {
    throw new Error('Missing search query');
  }

  const params = new URLSearchParams({
    q: query,
    format: 'jsonv2',
    addressdetails: '1',
    polygon_geojson: '1',
    limit: '8',
    countrycodes: 'ae'
  });

  const url = `https://nominatim.openstreetmap.org/search?${params.toString()}`;

  const response = await fetch(url, {
    method: 'GET',
    headers: {
      'Accept': 'application/json'
    }
  });

  if (!response.ok) {
    throw new Error(`Nominatim request failed with status ${response.status}`);
  }

  return await response.json();
}

function isPolygonGeoJSON(geom){

function candidateQueries(area){
  const qs = [
    `${area.name}, ${area.emirate}, UAE`,
    `${area.name} ${area.emirate}`,
    area.name
  ];
  return [...new Set(qs.filter(Boolean))];
}
function scoreGeoCandidate(item, area){
  let score = 0;
  const text = `${item.display_name||''} ${item.name||''}`.toLowerCase();
  const name = String(area.name||'').toLowerCase();
  const em = String(area.emirate||'').toLowerCase();
  if(text.includes(name)) score += 40;
  if(text.includes(em)) score += 20;
  if(item.type === 'suburb' || item.type === 'neighbourhood' || item.addresstype === 'suburb' || item.addresstype === 'neighbourhood') score += 15;
  if(item.class === 'boundary' || item.type === 'administrative') score -= 10;
  score += Number(item.importance || 0);
  return score;
}
async function proxyPolygon(area){
  try{
    const queries = candidateQueries(area);
    for(const q of queries){
      const results = await fetchBoundaryLookup(q);
      if(!Array.isArray(results) || !results.length) continue;
      const candidates = results.filter(r => isPolygonGeoJSON(r.geojson));
      if(!candidates.length) continue;
      candidates.sort((a,b)=>scoreGeoCandidate(b, area)-scoreGeoCandidate(a, area));
      const best = candidates[0];
      if(best && best.geojson) return best.geojson;
    }
  }catch(err){
    console.warn('Direct boundary lookup failed:', area?.name, err);
  }
  return null;
}
